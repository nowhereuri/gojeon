<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채근담 — 菜根譚</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg: #f7f4ef;
    --surface: #fefcf8;
    --border: #ddd8ce;
    --text: #2a2520;
    --muted: #8c8075;
    --accent: #6b4c2a;
    --accent2: #8b6540;
    --highlight: #f0e8de;
    --sidebar-w: 200px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ===== 헤더 ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.4rem 1.5rem 1.2rem;
    position: sticky; top: 0; z-index: 200;
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
  }
  .logo-wrap { flex-shrink: 0; }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 600;
    color: var(--accent); letter-spacing: 2px;
  }
  .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  .home-link {
    font-size: 11px; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px;
    transition: all 0.2s;
  }
  .home-link:hover { color: var(--accent); border-color: var(--accent); }

  .search-area { flex: 1; min-width: 180px; }
  .search-input {
    width: 100%; padding: 9px 16px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ===== 모바일 집 선택 ===== */
  .chapter-select-wrap {
    display: none;
    padding: 0.8rem 1rem 0.6rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .type-chips { display: flex; gap: 8px; }
  .type-chip {
    flex: 1; padding: 6px 0; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    color: var(--muted); cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .type-chip.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
    font-weight: 500;
  }

  /* ===== 레이아웃 ===== */
  .layout {
    max-width: 1100px; margin: 0 auto;
    display: flex; min-height: calc(100vh - 80px);
  }

  /* ===== 사이드바 ===== */
  aside {
    width: var(--sidebar-w); flex-shrink: 0;
    padding: 1.5rem 0;
    border-right: 1px solid var(--border);
    position: sticky; top: 80px;
    height: calc(100vh - 80px); overflow-y: auto;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 0.9rem 1.2rem; cursor: pointer;
    transition: background 0.15s; border-left: 3px solid transparent;
    font-size: 13px; color: var(--text);
  }
  .sidebar-item + .sidebar-item { border-top: 1px solid var(--border); }
  .sidebar-item:hover { background: var(--highlight); }
  .sidebar-item.active {
    background: var(--highlight);
    border-left-color: var(--accent);
    color: var(--accent); font-weight: 500;
  }
  .sidebar-item .si-hanja {
    font-family: 'Noto Serif KR', serif; font-size: 15px; flex-shrink: 0;
  }
  .sidebar-item .si-ko { font-size: 12px; color: var(--muted); }
  .sidebar-item.active .si-ko { color: var(--accent2); }
  .sidebar-item .si-count { margin-left: auto; font-size: 10px; color: var(--border); }

  /* ===== 메인 ===== */
  main { flex: 1; padding: 2rem 2rem 4rem; min-width: 0; }

  .search-mode .chapter-view { display: none; }
  .search-mode .search-results { display: block; }
  .search-results { display: none; }

  /* 집 헤더 */
  .chapter-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .ch-hanja {
    font-family: 'Noto Serif KR', serif; font-size: 28px;
    font-weight: 600; color: var(--accent); margin-bottom: 0.3rem;
  }
  .ch-ko { font-size: 16px; color: var(--text); margin-bottom: 0.4rem; }
  .ch-meaning { font-size: 13px; color: var(--muted); }

  /* 구절 카드 */
  .story-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .story-card:hover { border-color: var(--accent2); }

  .story-head {
    display: flex; align-items: center; gap: 12px;
    padding: 1rem 1.4rem; cursor: pointer; user-select: none;
  }
  .story-num {
    font-size: 11px; color: var(--muted);
    font-family: 'Noto Serif KR', serif; flex-shrink: 0;
  }
  .story-title { font-size: 14px; color: var(--text); flex: 1; }
  .story-arrow {
    color: var(--muted); font-size: 11px;
    transition: transform 0.2s; flex-shrink: 0;
  }
  .story-card.open .story-arrow { transform: rotate(180deg); }

  .story-body {
    display: none; border-top: 1px solid var(--border);
    padding: 1.4rem 1.6rem;
  }
  .story-card.open .story-body { display: block; }

  .section-label {
    font-size: 10px; color: var(--muted); letter-spacing: 2px;
    font-weight: 500; text-transform: uppercase; margin-bottom: 0.7rem;
  }
  .text-original {
    font-family: 'Noto Serif KR', serif; font-size: 16px;
    line-height: 2.8; color: var(--text); font-weight: 400;
    margin-bottom: 1.6rem; white-space: pre-line; cursor: pointer;
    border-radius: 4px; transition: background 0.15s;
  }
  .text-original:hover { background: #f5ede3; }
  .text-original ruby { font-size: 16px; ruby-position: under; }
  .text-original ruby rt { font-size: 10px; color: var(--accent); ruby-align: center; }

  .text-hint {
    font-size: 11px; color: var(--muted); margin-bottom: 1.2rem;
    margin-top: -1rem;
  }

  .text-literal {
    font-size: 14px; line-height: 1.9; color: var(--text);
    margin-bottom: 1.6rem; white-space: pre-line;
  }
  .text-meaning {
    font-size: 14px; line-height: 1.9; color: var(--text);
  }
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 1.4rem 0; }

  /* 한자 풀이 모달 */
  .hanja-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 300;
    justify-content: center; align-items: flex-start;
    overflow-y: auto; padding: 2rem 1rem;
  }
  .hanja-overlay.open { display: flex; }
  .hanja-modal {
    background: var(--surface); border-radius: 10px;
    max-width: 720px; width: 100%; padding: 2rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15); position: relative;
  }
  .hanja-modal-title {
    font-size: 11px; color: var(--muted); letter-spacing: 2px;
    font-weight: 500; margin-bottom: 1.2rem;
  }
  .hanja-modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; font-size: 22px;
    color: var(--muted); cursor: pointer;
  }
  .anno-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .anno-card {
    display: flex; flex-direction: column; align-items: center;
    min-width: 52px; padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  }
  .anno-card .ac-hanja { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 400; color: var(--text); line-height: 1.3; }
  .anno-card .ac-mean { font-size: 12px; color: var(--accent); line-height: 1.3; margin-top: 2px; }
  .anno-card .ac-read { font-size: 12px; color: var(--muted); line-height: 1.3; }
  .anno-break { width: 100%; height: 8px; }
  .anno-punct { font-size: 16px; color: var(--muted); align-self: center; padding: 0 2px; }

  /* 검색 결과 */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 1.2rem 1.4rem; margin-bottom: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  .result-card:hover { border-color: var(--accent); }
  .result-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .result-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .result-excerpt { font-size: 13px; color: var(--muted); line-height: 1.7; }
  mark { background: #f5dcc4; color: inherit; border-radius: 2px; padding: 0 1px; }
  .no-results { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }

  /* 반응형 */
  @media (max-width: 700px) {
    aside { display: none; }
    .chapter-select-wrap { display: block; }
    main { padding: 1.2rem 1rem 3rem; }
    .layout { min-height: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo">菜根譚</div>
      <div class="logo-sub">채근담 전문 · 洪自誠 萬曆本</div>
    </div>
    <div class="search-area">
      <input class="search-input" id="searchInput" type="text" placeholder="원문, 뜻, 직역, 해석으로 검색…" autocomplete="off">
      <div class="search-hint" id="searchHint"></div>
    </div>
    <a class="home-link" href="../">← 고전 목록</a>
  </div>
</header>

<div class="chapter-select-wrap">
  <div class="type-chips" id="typeChips">
    <button class="type-chip active" data-col="jeon" onclick="selectChip(this)">전집</button>
    <button class="type-chip" data-col="hu" onclick="selectChip(this)">후집</button>
  </div>
</div>

<div class="hanja-overlay" id="hanjaOverlay">
  <div class="hanja-modal">
    <button class="hanja-modal-close" onclick="closeHanjaModal()">×</button>
    <div class="hanja-modal-title">한자 풀이 漢字</div>
    <div id="hanjaGrid"></div>
  </div>
</div>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main">
    <div class="chapter-view" id="chapterView"></div>
    <div class="search-results" id="searchResults"></div>
  </main>
</div>

<script src="data.js"></script>
<script>
const BASE_DICT = {
  '一':{mean:'한',read:'일'},'不':{mean:'아닐',read:'불'},'中':{mean:'가운데',read:'중'},
  '之':{mean:'갈',read:'지'},'乎':{mean:'어조사',read:'호'},'也':{mean:'어조사',read:'야'},
  '事':{mean:'일',read:'사'},'于':{mean:'어조사',read:'우'},'人':{mean:'사람',read:'인'},
  '以':{mean:'써',read:'이'},'何':{mean:'어찌',read:'하'},'其':{mean:'그',read:'기'},
  '在':{mean:'있을',read:'재'},'外':{mean:'바깥',read:'외'},'得':{mean:'얻을',read:'득'},
  '心':{mean:'마음',read:'심'},'於':{mean:'어조사',read:'어'},'是':{mean:'이',read:'시'},
  '有':{mean:'있을',read:'유'},'無':{mean:'없을',read:'무'},'爲':{mean:'할',read:'위'},
  '矣':{mean:'어조사',read:'의'},'者':{mean:'놈',read:'자'},'而':{mean:'말이을',read:'이'},
  '自':{mean:'스스로',read:'자'},'處':{mean:'곳',read:'처'},'可':{mean:'옳을',read:'가'},
  '不':{mean:'아닐',read:'불'},'與':{mean:'더불',read:'여'},'若':{mean:'같을',read:'약'},
  '為':{mean:'할',read:'위'},'非':{mean:'아닐',read:'비'},'則':{mean:'법칙',read:'칙'},
  '人':{mean:'사람',read:'인'},'天':{mean:'하늘',read:'천'},'地':{mean:'땅',read:'지'}
};

const CHAPTERS = [
  { id: 'jeon', hanja: '前集', ko: '전집', meaning: '세속의 처세와 수양에 관한 잠언' },
  { id: 'hu',   hanja: '後集', ko: '후집', meaning: '자연과 한적한 삶에서 얻은 성찰' }
];

let currentCol = 'jeon';

function buildDict(anno) {
  const dict = Object.assign({}, BASE_DICT);
  if (!anno) return dict;
  const re = /(\S)\(([^)]+)\)/g;
  let m;
  while ((m = re.exec(anno)) !== null) {
    const parts = m[2].split(' ');
    const read = parts[parts.length - 1];
    const mean = parts.slice(0, -1).join(' ');
    dict[m[1]] = { mean, read };
  }
  return dict;
}

function hanjaCards(text, dict) {
  return text.split('\n').map((line, i, arr) => {
    let cards = '';
    for (const ch of line) {
      if (/[一-鿿㐀-䶿]/.test(ch)) {
        const info = dict[ch];
        if (info) {
          cards += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean">${info.mean}</span><span class="ac-read">${info.read}</span></div>`;
        } else {
          cards += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean">&nbsp;</span><span class="ac-read">&nbsp;</span></div>`;
        }
      } else if (/[，。？！、；：]/.test(ch)) {
        cards += `<span class="anno-punct">${ch}</span>`;
      }
    }
    return cards + (i < arr.length - 1 ? '<div class="anno-break"></div>' : '');
  }).join('');
}

function textWithPron(text, pron) {
  if (!pron) return text.split('\n').map(l => '<span style="display:block">' + l + '</span>').join('');
  const prArr = pron.match(/./gu) || [];
  let pi = 0;
  return text.split('\n').map(line => {
    let out = '';
    for (const ch of line) {
      if (/[一-鿿㐀-䶿]/.test(ch)) {
        out += `<ruby>${ch}<rt>${prArr[pi] || ''}</rt></ruby>`;
        pi++;
      } else {
        out += ch;
      }
    }
    return '<span style="display:block">' + out + '</span>';
  }).join('');
}

function openHanjaModal(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  const dict = buildDict(d.anno);
  document.getElementById('hanjaGrid').innerHTML = `<div class="anno-grid">${hanjaCards(d.text, dict)}</div>`;
  document.getElementById('hanjaOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeHanjaModal() {
  document.getElementById('hanjaOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('hanjaOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('hanjaOverlay')) closeHanjaModal();
});

function renderSidebar() {
  const html = CHAPTERS.map(ch => {
    const count = DATA.filter(d => d.col === ch.id).length;
    return `<div class="sidebar-item ${currentCol === ch.id ? 'active' : ''}" onclick="selectChapter('${ch.id}')">
      <span class="si-hanja">${ch.hanja}</span>
      <span class="si-ko">${ch.ko}</span>
      <span class="si-count">${count}</span>
    </div>`;
  }).join('');
  document.getElementById('sidebar').innerHTML = html;
}

function renderChapter(col) {
  const ch = CHAPTERS.find(c => c.id === col);
  const items = DATA.filter(d => d.col === col);

  const cardsHtml = items.map(d => {
    const num = String(d.num).padStart(3, '0');
    return `<div class="story-card" id="card-${d.id}">
      <div class="story-head" onclick="toggleCard('${d.id}')">
        <span class="story-num">${num}</span>
        <span class="story-title">${d.ko || ''}</span>
        <span class="story-arrow">▼</span>
      </div>
      <div class="story-body">
        <div class="section-label">원문 原文</div>
        <div class="text-original" onclick="openHanjaModal('${d.id}')">${textWithPron(d.text, d.pron)}</div>
        <div class="text-hint">※ 원문을 누르면 한자 풀이가 열립니다</div>
        <hr class="section-divider">
        <div class="section-label">직역 直譯</div>
        <div class="text-literal">${d.literal ? d.literal.replace(/\n/g, '<br>') : '—'}</div>
        <hr class="section-divider">
        <div class="section-label">해석 解釋</div>
        <div class="text-meaning">${d.meaning || '—'}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('chapterView').innerHTML = `
    <div class="chapter-header">
      <div class="ch-hanja">${ch.hanja}</div>
      <div class="ch-ko">${ch.ko}</div>
      <div class="ch-meaning">${ch.meaning} · ${items.length}구절</div>
    </div>
    ${cardsHtml}
  `;
}

function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

function selectChapter(col) {
  currentCol = col;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchHint').textContent = '';
  document.getElementById('main').classList.remove('search-mode');
  renderSidebar();
  renderChapter(col);
  document.querySelectorAll('.type-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.col === col);
  });
  window.scrollTo(0, 0);
}

function selectChip(btn) {
  selectChapter(btn.dataset.col);
}

function renderSearch(q) {
  const items = DATA.filter(d =>
    d.text.includes(q) ||
    (d.ko && d.ko.includes(q)) ||
    (d.pron && d.pron.includes(q)) ||
    (d.literal && d.literal.includes(q)) ||
    (d.meaning && d.meaning.includes(q))
  );

  document.getElementById('searchHint').textContent = `${items.length}개 구절`;
  document.getElementById('main').classList.add('search-mode');

  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const hl = text => text.replace(new RegExp(esc(q), 'g'), `<mark>${q}</mark>`);

  if (!items.length) {
    document.getElementById('searchResults').innerHTML = `<div class="no-results">검색 결과가 없어요.</div>`;
    return;
  }

  document.getElementById('searchResults').innerHTML = items.map(d => {
    const col = d.col === 'jeon' ? '전집' : '후집';
    const num = String(d.num).padStart(3, '0');
    const excerpt = (d.literal || d.meaning || '').slice(0, 60);
    return `<div class="result-card" onclick="goToCard('${d.id}')">
      <div class="result-meta">${col} · ${num}</div>
      <div class="result-title">${hl(d.ko || d.text.slice(0, 20))}</div>
      <div class="result-excerpt">${hl(excerpt)}…</div>
    </div>`;
  }).join('');
}

function goToCard(id) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  selectChapter(d.col);
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (el) {
      el.classList.add('open');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim();
  if (!q) {
    document.getElementById('searchHint').textContent = '';
    document.getElementById('main').classList.remove('search-mode');
    renderChapter(currentCol);
  } else {
    renderSearch(q);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeHanjaModal();
});

renderSidebar();
renderChapter('jeon');
</script>
</body>
</html>
