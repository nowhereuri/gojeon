<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금강경 — 金剛般若波羅蜜經</title>
<link rel="icon" type="image/svg+xml" href="../icon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
  :root {
    --bg:#f7f4ef; --surface:#fefcf8; --border:#ddd8ce;
    --text:#2a2520; --muted:#8c8075; --accent:#7a5c3a;
    --highlight:#e8dfd0; --sidebar-w:220px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-weight:300; min-height:100vh; }

  /* ===== 헤더 ===== */
  header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:1rem 1.5rem; position:sticky; top:0; z-index:100;
  }
  .header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
  .logo { font-family:'Noto Serif KR',serif; font-size:20px; font-weight:600; color:var(--accent); letter-spacing:2px; white-space:nowrap; }
  .logo-sub { font-size:11px; color:var(--muted); white-space:nowrap; }
  .home-link { font-size:11px; color:var(--muted); text-decoration:none; border:1px solid var(--border); padding:3px 10px; border-radius:20px; transition:all 0.2s; white-space:nowrap; }
  .home-link:hover { color:var(--accent); border-color:var(--accent); }
  .search-input {
    flex:1; min-width:180px; padding:8px 14px;
    border:1px solid var(--border); border-radius:4px;
    background:var(--bg); font-family:'Noto Sans KR',sans-serif;
    font-size:14px; color:var(--text); outline:none; transition:border-color 0.2s;
  }
  .search-input:focus { border-color:var(--accent); }

  /* ===== 레이아웃 ===== */
  .layout { display:flex; max-width:1100px; margin:0 auto; min-height:calc(100vh - 60px); }

  /* ===== 사이드바 ===== */
  .sidebar {
    width:var(--sidebar-w); flex-shrink:0;
    border-right:1px solid var(--border); background:var(--surface);
    position:sticky; top:60px; height:calc(100vh - 60px);
    overflow-y:auto; padding:1rem 0;
  }
  .sidebar-item {
    display:flex; align-items:baseline; gap:6px;
    padding:7px 16px; cursor:pointer; transition:background 0.15s;
    border-left:3px solid transparent; font-size:13px;
  }
  .sidebar-item:hover { background:var(--highlight); }
  .sidebar-item.active { border-left-color:var(--accent); background:var(--highlight); font-weight:500; }
  .sidebar-num { font-size:11px; color:var(--muted); min-width:28px; }
  .sidebar-title { font-family:'Noto Serif KR',serif; font-size:13px; color:var(--accent); }
  .sidebar-ko { font-size:11px; color:var(--muted); }

  /* 검색 결과 모드 */
  .sidebar-search-item {
    padding:6px 16px; cursor:pointer; font-size:12px; color:var(--muted);
    transition:background 0.15s;
  }
  .sidebar-search-item:hover { background:var(--highlight); color:var(--accent); }

  /* ===== 메인 ===== */
  .main { flex:1; padding:2rem 2.5rem; min-width:0; }

  /* 검색 결과 카드 목록 */
  .search-result-card {
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:1.2rem 1.5rem; margin-bottom:10px; cursor:pointer; transition:all 0.2s;
  }
  .search-result-card:hover { border-color:var(--accent); box-shadow:0 2px 10px rgba(122,92,58,0.08); }
  .src-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .src-tag { font-size:11px; padding:2px 8px; border-radius:20px; background:#ece6f0; color:#5a4a6b; font-weight:500; }
  .src-title { font-family:'Noto Serif KR',serif; font-size:14px; color:var(--accent); }
  .src-ko { font-size:12px; color:var(--muted); }
  .src-preview { font-family:'Noto Serif KR',serif; font-size:14px; color:var(--text); line-height:1.8; margin-top:4px; }
  mark { background:#fde68a; color:inherit; border-radius:2px; padding:0 1px; }

  /* 분 상세 뷰 */
  .chapter-header { margin-bottom:1.8rem; }
  .chapter-num { font-size:12px; color:var(--muted); margin-bottom:0.3rem; }
  .chapter-title { font-family:'Noto Serif KR',serif; font-size:26px; font-weight:600; color:var(--accent); margin-bottom:0.2rem; }
  .chapter-ko { font-size:14px; color:var(--muted); }

  .section-label { font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; font-weight:500; }
  .original-text { font-family:'Noto Serif KR',serif; font-size:17px; line-height:2.2; color:var(--text); margin-bottom:2rem; }
  .original-text { cursor:pointer; }
  .original-text:hover { background:var(--highlight); border-radius:4px; }
  .original-text ruby rt { font-size:10px; color:var(--muted); ruby-position:under; }

  .meaning-box {
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:1.4rem 1.6rem; font-size:15px; line-height:2; color:var(--text);
  }

  .nav-btns { display:flex; justify-content:space-between; margin-top:2rem; }
  .nav-btn {
    padding:8px 18px; border:1px solid var(--border); border-radius:4px;
    background:transparent; font-family:'Noto Sans KR',sans-serif;
    font-size:13px; color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .nav-btn:hover { border-color:var(--accent); color:var(--accent); }
  .nav-btn:disabled { opacity:0.3; cursor:default; }

  /* ===== 한자 풀이 모달 ===== */
  .hanja-modal-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.4); z-index:300;
    justify-content:center; align-items:flex-start;
    overflow-y:auto; padding:2rem 1rem;
  }
  .hanja-modal-overlay.open { display:flex; }
  .hanja-modal {
    background:var(--surface); border-radius:10px; padding:1.8rem 2rem;
    box-shadow:0 8px 40px rgba(0,0,0,0.15); max-width:700px; width:100%; position:relative;
  }
  .hanja-modal-close { position:absolute; top:0.8rem; right:1rem; background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; }
  .hanja-modal-title { font-family:'Noto Serif KR',serif; font-size:14px; color:var(--accent); margin-bottom:1.2rem; font-weight:500; }
  .anno-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .anno-card {
    display:flex; flex-direction:column; align-items:center;
    min-width:52px; padding:6px 8px;
    background:var(--bg); border:1px solid var(--border); border-radius:6px;
  }
  .anno-card .ac-hanja { font-family:'Noto Serif KR',serif; font-size:20px; font-weight:400; color:var(--text); line-height:1.3; }
  .anno-card .ac-mean { font-size:12px; color:var(--accent); line-height:1.3; margin-top:2px; }
  .anno-card .ac-read { font-size:12px; color:var(--muted); line-height:1.3; }
  .anno-break { width:100%; height:8px; }
  .anno-punct { font-size:16px; color:var(--muted); align-self:center; padding:0 2px; }

  /* ===== 모바일 ===== */
  .chapter-select-wrap { display:none; padding:0.8rem 1rem; background:var(--surface); border-bottom:1px solid var(--border); }
  .chapter-select { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:4px; background:var(--bg); font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--text); outline:none; }

  .empty { text-align:center; padding:4rem 1rem; color:var(--muted); font-size:15px; }
  .empty .em { font-family:'Noto Serif KR',serif; font-size:28px; color:var(--border); display:block; margin-bottom:1rem; }

  @media (max-width:700px) {
    .sidebar { display:none; }
    .chapter-select-wrap { display:block; }
    .layout { display:block; }
    .main { padding:1.2rem 1rem; }
    .chapter-title { font-size:20px; }
    .original-text { font-size:15px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">金剛經</div>
      <div class="logo-sub">금강반야바라밀경 · 32분</div>
    </div>
    <input class="search-input" id="searchInput" type="text" placeholder="한자, 분 제목, 번역으로 검색...">
    <a href="../" class="home-link">← 고전 목록</a>
  </div>
</header>

<div class="chapter-select-wrap">
  <select class="chapter-select" id="chapterSelect" onchange="selectById(this.value)"></select>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<!-- 한자 모달 -->
<div class="hanja-modal-overlay" id="hanjaOverlay" onclick="closeHanjaModal(event)">
  <div class="hanja-modal">
    <button class="hanja-modal-close" onclick="closeHanjaModal()">&times;</button>
    <div class="hanja-modal-title" id="hanjaModalTitle"></div>
    <div id="hanjaGrid"></div>
  </div>
</div>

function isCJK(ch) {
  return /[一-鿿㐀-䶿]/.test(ch);
}

function rubyText(text) {
  if (!text) return '';
  return text.split('').map(ch => {
    if (isCJK(ch)) {
      const info = HANJA_DICT[ch];
      const rt = info ? info.r : '';
      return `<ruby>${ch}<rt>${rt}</rt></ruby>`;
    }
    if (ch === '\n') return '<br>';
    return ch;
  }).join('');
}

function showHanjaModal(id, title) {
  const d = DATA.find(x => x.id === id);
  if (!d) return;
  const lines = d.text.split('\n');
  let html = '';
  lines.forEach((line, i) => {
    html += '<div class="anno-grid">';
    for (const ch of line) {
      if (isCJK(ch)) {
        const info = HANJA_DICT[ch];
        if (info) {
          html += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean">${info.m}</span><span class="ac-read">${info.r}</span></div>`;
        } else {
          html += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean"> </span><span class="ac-read"> </span></div>`;
        }
      } else if (/[，。？！、；：「」]/.test(ch)) {
        html += `<span class="anno-punct">${ch}</span>`;
      }
    }
    html += '</div>';
    if (i < lines.length - 1) html += '<div class="anno-break"></div>';
  });
  document.getElementById('hanjaModalTitle').textContent = title;
  document.getElementById('hanjaGrid').innerHTML = html;
  document.getElementById('hanjaOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeHanjaModal(e) {
  if (!e || e.target === document.getElementById('hanjaOverlay') || e.target === e.currentTarget) {
    document.getElementById('hanjaOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeHanjaModal();
});

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = DATA.map(d => `
    <div class="sidebar-item ${d.id === currentId ? 'active' : ''}" onclick="selectById('${d.id}')">
      <span class="sidebar-num">제${d.num}분</span>
      <span class="sidebar-title">${d.title}</span>
    </div>
  `).join('');
}

function renderSelect() {
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = DATA.map(d =>
    `<option value="${d.id}" ${d.id === currentId ? 'selected' : ''}>제${d.num}분 ${d.titleKo} (${d.title})</option>`
  ).join('');
}

function selectById(id) {
  searchMode = false;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  currentId = id;
  renderSidebar();
  renderSelect();
  renderChapter();
  window.scrollTo(0, 0);
}

function renderChapter() {
  const d = DATA.find(x => x.id === currentId);
  if (!d) return;
  const idx = DATA.indexOf(d);
  const prev = DATA[idx - 1];
  const next = DATA[idx + 1];

  document.getElementById('main').innerHTML = `
    <div class="chapter-header">
      <div class="chapter-num">제${d.num}분</div>
      <div class="chapter-title">${d.title}</div>
      <div class="chapter-ko">${d.titleKo}</div>
    </div>

    <div class="section-label">원문 原文 <span style="font-size:9px;color:var(--muted);font-weight:300;letter-spacing:0">· 클릭하면 한자 풀이</span></div>
    <div class="original-text" onclick="showHanjaModal('${d.id}', '제${d.num}분 ${d.title} ${d.titleKo}')">${rubyText(d.text)}</div>

    <div class="section-label">번역</div>
    <div class="meaning-box">${(d.meaning || '').replace(/\n/g, '<br>')}</div>

    <div class="nav-btns">
      <button class="nav-btn" onclick="selectById('${prev ? prev.id : ''}')" ${!prev ? 'disabled' : ''}>
        ← ${prev ? '제' + prev.num + '분' : ''}
      </button>
      <button class="nav-btn" onclick="selectById('${next ? next.id : ''}')" ${!next ? 'disabled' : ''}>
        ${next ? '제' + next.num + '분' : ''} →
      </button>
    </div>
  `;
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g');
  return text.replace(re, '<mark>$1</mark>');
}

function renderSearch(q) {
  const items = DATA.filter(d =>
    d.text.includes(q) || d.title.includes(q) ||
    (d.titleKo && d.titleKo.includes(q)) ||
    (d.meaning && d.meaning.includes(q))
  );

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = items.map(d => `
    <div class="sidebar-search-item" onclick="selectById('${d.id}')">제${d.num}분 ${d.titleKo}</div>
  `).join('') || '<div style="padding:1rem;font-size:12px;color:var(--muted);">결과 없음</div>';

  if (!items.length) {
    document.getElementById('main').innerHTML = `<div class="empty"><span class="em">金剛經</span>검색 결과가 없어요.</div>`;
    return;
  }

  document.getElementById('main').innerHTML = items.map(d => {
    const preview = d.text.length > 80 ? d.text.substring(0, 80) + '…' : d.text;
    return `<div class="search-result-card" onclick="selectById('${d.id}')">
      <div class="src-top">
        <span class="src-tag">제${d.num}분</span>
        <span class="src-title">${hl(d.title, q)}</span>
        <span class="src-ko">${hl(d.titleKo, q)}</span>
      </div>
      <div class="src-preview">${hl(preview, q)}</div>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim();
  if (!q) {
    searchMode = false;
    renderSidebar();
    renderChapter();
  } else {
    searchMode = true;
    searchQuery = q;
    renderSearch(q);
  }
});

// 초기 렌더
currentId = DATA[0].id;
renderSidebar();
renderSelect();
renderChapter();
</script>
</body>
</html>
