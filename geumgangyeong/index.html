<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금강경 검색 — 金剛經</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg: #f7f4ef;
    --surface: #fefcf8;
    --border: #ddd8ce;
    --text: #2a2520;
    --muted: #8c8075;
    --accent: #6b4c2a;
    --highlight: #e8dfd0;
    --tag-bun: #5a4a6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner { max-width: 860px; margin: 0 auto; }

  .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px; font-weight: 600;
    color: var(--accent); letter-spacing: 2px; margin-bottom: 0.3rem;
  }

  .logo-sub {
    font-size: 12px; color: var(--muted);
    letter-spacing: 1px; margin-bottom: 1.2rem;
  }

  .search-wrap { display: flex; gap: 8px; flex-wrap: wrap; }

  .search-input {
    flex: 1; min-width: 200px; padding: 10px 16px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }

  .filter-btn {
    padding: 10px 16px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .stats { font-size: 12px; color: var(--muted); margin-top: 0.8rem; }
  .stats span { color: var(--accent); font-weight: 500; }

  main { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 1.4rem 1.6rem; margin-bottom: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(107,76,42,0.08); }

  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 0.8rem; }

  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; letter-spacing: 0.5px; }
  .tag-bun { background: #ece6f0; color: var(--tag-bun); }

  .num { font-size: 13px; color: var(--muted); font-family: 'Noto Serif KR', serif; }

  .bun-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px; color: var(--accent); font-weight: 400;
  }

  .hanja { font-family: 'Noto Serif KR', serif; font-size: 16px; line-height: 1.9; color: var(--text); font-weight: 400; }
  .hanja .line { display: block; }

  .written-badge {
    margin-left: auto; font-size: 11px; padding: 2px 8px;
    border-radius: 20px; background: #e8f0e6; color: #4a6741;
  }

  .fav-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: #fff3e0; color: #b8860b;
  }

  .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 15px; }
  .empty .em { font-family: 'Noto Serif KR', serif; font-size: 28px; color: var(--border); display: block; margin-bottom: 1rem; }

  mark { background: #fde68a; color: inherit; border-radius: 2px; padding: 0 1px; }

  /* ===== 상세 모달 ===== */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    justify-content: center; align-items: flex-start;
    overflow-y: auto; padding: 2rem 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border-radius: 10px;
    max-width: 720px; width: 100%; padding: 2rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    position: relative;
  }

  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; font-size: 22px;
    color: var(--muted); cursor: pointer;
  }

  .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }

  .modal-section { margin-bottom: 1.5rem; }
  .modal-section-title {
    font-size: 11px; color: var(--muted); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 8px; font-weight: 500;
  }
  .modal-section-body {
    font-size: 15px; line-height: 1.9; color: var(--text);
  }
  .modal-section-body.hanja-text {
    font-family: 'Noto Serif KR', serif; font-weight: 400;
  }

  .hanja-ruby ruby { font-size: 18px; ruby-position: under; }
  .hanja-ruby ruby rt { font-size: 12px; color: var(--accent); ruby-align: center; }

  .anno-grid {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
  }
  .anno-card {
    display: flex; flex-direction: column; align-items: center;
    min-width: 52px; padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  }
  .anno-card .ac-hanja {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 400; color: var(--text); line-height: 1.3;
  }
  .anno-card .ac-mean {
    font-size: 12px; color: var(--accent); line-height: 1.3; margin-top: 2px;
  }
  .anno-card .ac-read {
    font-size: 12px; color: var(--muted); line-height: 1.3;
  }
  .anno-break { width: 100%; height: 8px; }
  .anno-punct { font-size: 16px; color: var(--muted); align-self: center; padding: 0 2px; }

  .modal-memo {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 4px; background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    color: var(--text); resize: none; min-height: 70px; outline: none;
  }
  .modal-memo:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.5rem; }
  .modal-btn {
    padding: 8px 18px; border: 1px solid var(--border); border-radius: 4px;
    background: transparent; font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .modal-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 24px;
    border-radius: 8px; font-size: 13px; z-index: 300;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">金剛經</div>
    <div class="logo-sub">금강반야바라밀경 전문 검색 · 鳩摩羅什 漢譯</div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="한자, 분 제목, 직역, 해석으로 검색..." autofocus>
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="fav">즐겨찾기</button>
      <button class="filter-btn" data-filter="written">작성완료</button>
    </div>
    <div class="stats" id="stats">전체 <span>32</span>분</div>
  </div>
</header>

<main id="results"></main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
const LS_PREFIX = 'gge_';
const written = JSON.parse(localStorage.getItem(LS_PREFIX+'written')||'{}');
const memos = JSON.parse(localStorage.getItem(LS_PREFIX+'memos')||'{}');
const favs = JSON.parse(localStorage.getItem(LS_PREFIX+'favs')||'{}');

let filter='all', query='';

function hl(text, q){
  if(!q) return text;
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g');
  return text.replace(re,'<mark>$1</mark>');
}

function render(){
  const q = query.trim();
  let items = DATA;
  if(filter==='written') items=items.filter(d=>written[d.id]);
  else if(filter==='fav') items=items.filter(d=>favs[d.id]);
  if(q) items=items.filter(d=>
    d.text.includes(q)||d.id.includes(q)||
    (d.title&&d.title.includes(q))||
    (d.titleKo&&d.titleKo.includes(q))||
    (d.pron&&d.pron.includes(q))||
    (d.literal&&d.literal.includes(q))||
    (d.meaning&&d.meaning.includes(q))
  );

  document.getElementById('stats').innerHTML =
    filter==='all'&&!q ? `전체 <span>32</span>분` :
    `<span>${items.length}</span>분${q?' — '+q:''}`;

  if(!items.length){
    document.getElementById('results').innerHTML=`<div class="empty"><span class="em">金剛經</span>검색 결과가 없어요.</div>`;
    return;
  }

  document.getElementById('results').innerHTML = items.map(d=>{
    const preview = d.text.length > 100 ? d.text.substring(0,100)+'…' : d.text;
    const w = written[d.id];
    const f = favs[d.id];
    return `<div class="card" onclick="openModal('${d.id}')" id="card-${d.id}">
      <div class="card-top">
        <span class="tag tag-bun">제${d.num}분</span>
        <span class="bun-title">${hl(d.title,q)}</span>
        <span class="num">${hl(d.titleKo,q)}</span>
        ${f?'<span class="fav-badge">★</span>':''}
        ${w?'<span class="written-badge">✓</span>':''}
      </div>
      <div class="hanja"><span class="line">${hl(preview,q)}</span></div>
    </div>`;
  }).join('');
}

function openModal(id){
  const d = DATA.find(x=>x.id===id);
  if(!d) return;

  function textWithPron(text, pron){
    if(!pron) return text.split('\n').map(l=>'<span style="display:block">'+l+'</span>').join('');
    const prArr = pron.match(/./gu)||[];
    let pi = 0;
    return text.split('\n').map(line=>{
      let out = '';
      for(const ch of line){
        if(/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(ch)){
          out += `<ruby>${ch}<rt>${prArr[pi]||''}</rt></ruby>`;
          pi++;
        } else {
          out += ch;
        }
      }
      return '<span style="display:block">'+out+'</span>';
    }).join('');
  }

  const BASE_DICT = {
    '一':{mean:'한',read:'일'},'不':{mean:'아닐',read:'불'},'中':{mean:'가운데',read:'중'},
    '之':{mean:'갈',read:'지'},'乎':{mean:'어조사',read:'호'},'也':{mean:'어조사',read:'야'},
    '了':{mean:'마칠',read:'료'},'事':{mean:'일',read:'사'},'于':{mean:'어조사',read:'우'},
    '人':{mean:'사람',read:'인'},'以':{mean:'써',read:'이'},'何':{mean:'어찌',read:'하'},
    '便':{mean:'편할',read:'편'},'個':{mean:'낱',read:'개'},'其':{mean:'그',read:'기'},
    '在':{mean:'있을',read:'재'},'外':{mean:'바깥',read:'외'},'得':{mean:'얻을',read:'득'},
    '心':{mean:'마음',read:'심'},'於':{mean:'어조사',read:'어'},'是':{mean:'이',read:'시'},
    '有':{mean:'있을',read:'유'},'段':{mean:'구분',read:'단'},'游':{mean:'놀',read:'유'},
    '無':{mean:'없을',read:'무'},'爲':{mean:'할',read:'위'},'的':{mean:'과녁',read:'적'},
    '矣':{mean:'어조사',read:'의'},'者':{mean:'놈',read:'자'},'而':{mean:'말이을',read:'이'},
    '自':{mean:'스스로',read:'자'},'處':{mean:'곳',read:'처'},'裁':{mean:'마를',read:'재'}
  };

  function annoToCards(anno, text){
    if(!anno || !text) return '';
    const dict = Object.assign({}, BASE_DICT);
    const re = /(\S)\(([^)]+)\)/g;
    let m;
    while((m=re.exec(anno))!==null){
      const parts = m[2].split(' ');
      const read = parts[parts.length-1];
      const mean = parts.slice(0,-1).join(' ');
      dict[m[1]] = {mean, read};
    }
    return text.split('\n').map((line,i)=>{
      let cards = '';
      for(const ch of line){
        if(/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(ch)){
          const info = dict[ch];
          if(info){
            cards += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean">${info.mean}</span><span class="ac-read">${info.read}</span></div>`;
          } else {
            cards += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean">&nbsp;</span><span class="ac-read">&nbsp;</span></div>`;
          }
        } else if(/[，。？！、；：「」]/.test(ch)){
          cards += `<span class="anno-punct">${ch}</span>`;
        }
      }
      return cards + (i < text.split('\n').length-1 ? '<div class="anno-break"></div>' : '');
    }).join('');
  }

  // 빈 섹션은 숨김 처리
  const hasLiteral = d.literal && d.literal.trim();
  const hasMeaning = d.meaning && d.meaning.trim();
  const hasAnno = d.anno && d.anno.trim();
  const hasPron = d.pron && d.pron.trim();

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <span class="tag tag-bun">제${d.num}분</span>
      <span class="bun-title" style="font-size:18px;">${d.title}</span>
      <span class="num">${d.titleKo}</span>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">원문 原文</div>
      <div class="modal-section-body hanja-text ${hasPron?'hanja-ruby':''}">${textWithPron(d.text, d.pron)}</div>
    </div>

    ${hasLiteral ? `<div class="modal-section">
      <div class="modal-section-title">직역 直譯</div>
      <div class="modal-section-body">${d.literal.replace(/\n/g,'<br>')}</div>
    </div>` : ''}

    ${hasMeaning ? `<div class="modal-section">
      <div class="modal-section-title">해석 解釋</div>
      <div class="modal-section-body">${d.meaning}</div>
    </div>` : ''}

    ${hasAnno ? `<div class="modal-section">
      <div class="modal-section-title">한자 풀이 漢字</div>
      <div class="anno-grid">${annoToCards(d.anno, d.text)}</div>
    </div>` : ''}

    <div class="modal-section">
      <div class="modal-section-title">메모</div>
      <textarea class="modal-memo" placeholder="이 분에 대한 나만의 메모..." onchange="saveMemo('${d.id}',this.value)">${memos[d.id]||''}</textarea>
    </div>

    <div class="modal-actions">
      <button class="modal-btn ${favs[d.id]?'active':''}" onclick="toggleFav('${d.id}')">
        ${favs[d.id]?'★ 즐겨찾기 해제':'☆ 즐겨찾기'}
      </button>
      <button class="modal-btn" onclick="shareItem('${d.id}')">
        공유
      </button>
      <button class="modal-btn ${written[d.id]?'active':''}" onclick="toggleWritten('${d.id}')">
        ${written[d.id]?'✓ 작성완료':'작성완료 표시'}
      </button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
});

function saveMemo(id,val){
  memos[id]=val;
  localStorage.setItem(LS_PREFIX+'memos',JSON.stringify(memos));
}

function toggleWritten(id){
  written[id]=!written[id];
  localStorage.setItem(LS_PREFIX+'written',JSON.stringify(written));
  openModal(id);
  render();
}

function toggleFav(id){
  favs[id]=!favs[id];
  localStorage.setItem(LS_PREFIX+'favs',JSON.stringify(favs));
  openModal(id);
  render();
}

function shareItem(id){
  const d = DATA.find(x=>x.id===id);
  if(!d) return;
  const text = `【금강경 ${d.id} ${d.title} ${d.titleKo}】\n\n${d.text}${d.literal?'\n\n[직역]\n'+d.literal:''}${d.meaning?'\n\n[해석]\n'+d.meaning:''}`;
  if(navigator.share){
    navigator.share({title:'금강경 '+d.id, text}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>showToast('클립보드에 복사되었습니다'));
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('searchInput').addEventListener('input',e=>{
  query=e.target.value;
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filter=btn.dataset.filter;
    render();
  });
});

render();
</script>
</body>
</html>
