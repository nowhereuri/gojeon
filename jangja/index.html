<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장자 — 莊子</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --bg: #f4f1ec;
    --surface: #fdfbf7;
    --border: #ddd8ce;
    --text: #2a2520;
    --muted: #8c8075;
    --accent: #4a6741;
    --accent2: #6b8f61;
    --highlight: #e6ede4;
    --sidebar-w: 220px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ===== 헤더 ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.4rem 1.5rem 1.2rem;
    position: sticky; top: 0; z-index: 200;
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
  }
  .logo-wrap { flex-shrink: 0; }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 600;
    color: var(--accent); letter-spacing: 2px;
  }
  .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  .home-link {
    font-size: 11px; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px;
    transition: all 0.2s;
  }
  .home-link:hover { color: var(--accent); border-color: var(--accent); }

  .search-area { flex: 1; min-width: 180px; }
  .search-input {
    width: 100%; padding: 9px 16px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ===== 모바일 편 선택 드롭다운 ===== */
  .chapter-select-wrap {
    display: none;
    padding: 0.8rem 1rem 0.6rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .type-chips {
    display: flex; gap: 8px; margin-bottom: 0.6rem;
  }
  .type-chip {
    flex: 1; padding: 6px 0; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    color: var(--muted); cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .type-chip.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
    font-weight: 500;
  }
  .chapter-select {
    width: 100%; padding: 8px 12px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; color: var(--text); outline: none;
  }

  /* ===== 본문 레이아웃 ===== */
  .layout {
    max-width: 1100px; margin: 0 auto;
    display: flex; gap: 0; min-height: calc(100vh - 80px);
  }

  /* ===== 사이드바 ===== */
  aside {
    width: var(--sidebar-w); flex-shrink: 0;
    padding: 1.5rem 0;
    border-right: 1px solid var(--border);
    position: sticky; top: 80px;
    height: calc(100vh - 80px); overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 0.5rem; }
  .sidebar-type {
    font-size: 13px; color: var(--text); letter-spacing: 0.5px;
    padding: 0.6rem 1.2rem; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    user-select: none; border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .sidebar-type:first-child { border-top: none; }
  .sidebar-type:hover { background: var(--highlight); color: var(--accent); }
  .sidebar-type-arrow { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
  .sidebar-type.collapsed .sidebar-type-arrow { transform: rotate(-90deg); }
  .sidebar-group { overflow: hidden; transition: max-height 0.25s ease; }
  .sidebar-group.collapsed { max-height: 0 !important; }
  .si-num { font-size: 11px; color: var(--muted); min-width: 18px; }
  .sidebar-item {
    display: flex; align-items: baseline; gap: 6px;
    padding: 0.55rem 1.2rem; cursor: pointer;
    transition: background 0.15s; border-left: 3px solid transparent;
    font-size: 13px; color: var(--text);
  }
  .sidebar-item:hover { background: var(--highlight); }
  .sidebar-item.active {
    background: var(--highlight);
    border-left-color: var(--accent);
    color: var(--accent); font-weight: 500;
  }
  .sidebar-item .si-hanja {
    font-family: 'Noto Serif KR', serif; font-size: 13px; flex-shrink: 0;
  }
  .sidebar-item .si-ko { font-size: 12px; color: var(--muted); }
  .sidebar-item.active .si-ko { color: var(--accent2); }
  .sidebar-item .si-count {
    margin-left: auto; font-size: 10px; color: var(--border);
  }
  .sidebar-item.soon { opacity: 0.4; cursor: default; }

  /* ===== 메인 콘텐츠 ===== */
  main {
    flex: 1; padding: 2rem 2rem 4rem;
    min-width: 0;
  }

  /* 검색 결과 모드 */
  .search-mode .chapter-view { display: none; }
  .search-mode .search-results { display: block; }
  .search-results { display: none; }

  /* 편 헤더 */
  .chapter-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .ch-type { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-bottom: 0.5rem; }
  .ch-title {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 0.8rem;
  }
  .ch-hanja {
    font-family: 'Noto Serif KR', serif; font-size: 28px;
    font-weight: 600; color: var(--accent);
  }
  .ch-ko { font-size: 18px; color: var(--text); }
  .ch-meaning { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }
  /* 개요 아코디언 */
  .ch-intro-wrap {
    background: var(--highlight); border-radius: 6px;
    border-left: 3px solid var(--accent); overflow: hidden;
  }
  .ch-intro-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.4rem; cursor: pointer; user-select: none;
    gap: 1rem;
  }
  .ch-intro-keywords {
    display: flex; flex-wrap: wrap; gap: 6px; flex: 1;
  }
  .ch-intro-kw {
    font-size: 12px; color: var(--accent); font-weight: 500;
    background: rgba(74,103,65,0.1); padding: 2px 10px; border-radius: 20px;
    font-family: 'Noto Serif KR', serif;
  }
  .ch-intro-btn {
    font-size: 11px; color: var(--muted); white-space: nowrap;
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .ch-intro-arrow {
    font-size: 10px; transition: transform 0.25s;
  }
  .ch-intro-wrap.open .ch-intro-arrow { transform: rotate(180deg); }
  .ch-intro-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.25s;
    padding: 0 1.4rem;
  }
  .ch-intro-wrap.open .ch-intro-body {
    max-height: 1000px;
    padding: 0 1.4rem 1.2rem;
  }
  .ch-intro {
    font-size: 14px; line-height: 1.9; color: var(--text);
    white-space: pre-line;
  }

  /* 이야기 카드 */
  .story-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 12px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .story-card:hover { border-color: var(--accent2); }

  .story-head {
    display: flex; align-items: center; gap: 12px;
    padding: 1.1rem 1.4rem; cursor: pointer;
  }
  .story-num {
    font-size: 11px; color: var(--muted);
    font-family: 'Noto Serif KR', serif; flex-shrink: 0;
  }
  .story-hanja {
    font-family: 'Noto Serif KR', serif; font-size: 14px;
    color: var(--accent); flex-shrink: 0;
  }
  .story-title { font-size: 14px; color: var(--text); }
  .story-arrow {
    margin-left: auto; color: var(--muted); font-size: 12px;
    transition: transform 0.2s; flex-shrink: 0;
  }
  .story-card.open .story-arrow { transform: rotate(180deg); }

  .story-body {
    display: none; border-top: 1px solid var(--border);
    padding: 1.4rem 1.6rem;
  }
  .story-card.open .story-body { display: block; }

  .section-label {
    font-size: 10px; color: var(--muted); letter-spacing: 2px;
    font-weight: 500; text-transform: uppercase; margin-bottom: 0.7rem;
  }
  .text-original {
    font-family: 'Noto Serif KR', serif; font-size: 16px;
    line-height: 2.8; color: var(--text); font-weight: 400;
    margin-bottom: 1.6rem; white-space: pre-line;
    cursor: pointer;
  }
  .text-original:hover { background: #f0f5ef; border-radius: 4px; }
  .text-original ruby { font-size: 16px; ruby-position: under; }
  .text-original ruby rt { font-size: 10px; color: var(--accent); ruby-align: center; }

  /* 한자 풀이 모달 */
  .hanja-overlay {
    display: none; position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.4); z-index: 300;
    justify-content: center; align-items: flex-start;
    overflow-y: auto; padding: 2rem 1rem;
  }
  .hanja-overlay.open { display: flex; }
  .hanja-modal {
    background: var(--surface); border-radius: 10px;
    max-width: 720px; width: 100%; padding: 2rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    position: relative;
  }
  .hanja-modal-title {
    font-size: 11px; color: var(--muted); letter-spacing: 2px;
    font-weight: 500; margin-bottom: 1.2rem;
  }
  .hanja-modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; font-size: 22px;
    color: var(--muted); cursor: pointer;
  }
  .anno-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .anno-card {
    display: flex; flex-direction: column; align-items: center;
    min-width: 52px; padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  }
  .anno-card .ac-hanja { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 400; color: var(--text); line-height: 1.3; }
  .anno-card .ac-mean { font-size: 12px; color: var(--accent); line-height: 1.3; margin-top: 2px; }
  .anno-card .ac-read { font-size: 12px; color: var(--muted); line-height: 1.3; }
  .anno-break { width: 100%; height: 8px; }
  .anno-punct { font-size: 16px; color: var(--muted); align-self: center; padding: 0 2px; }
  .text-literal {
    font-size: 14px; line-height: 1.9; color: var(--text);
    margin-bottom: 1.6rem; white-space: pre-line;
  }
  .text-meaning {
    font-size: 14px; line-height: 1.9; color: var(--text);
    white-space: pre-line;
  }
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 1.4rem 0; }

  /* 준비 중 */
  .nav-btns { display:flex; justify-content:space-between; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); }
  .nav-btn {
    padding:8px 18px; border:1px solid var(--border); border-radius:4px;
    background:transparent; font-family:'Noto Sans KR',sans-serif;
    font-size:13px; color:var(--muted); cursor:pointer; transition:all 0.2s;
  }
  .nav-btn:hover { border-color:var(--accent); color:var(--accent); }
  .nav-btn:disabled { opacity:0.3; cursor:default; pointer-events:none; }

  .coming-soon {
    text-align: center; padding: 5rem 2rem;
    color: var(--muted); font-size: 14px;
  }
  .coming-soon .cs-hanja {
    font-family: 'Noto Serif KR', serif; font-size: 40px;
    color: var(--border); display: block; margin-bottom: 1rem;
  }

  /* 검색 결과 */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 1.2rem 1.4rem; margin-bottom: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  .result-card:hover { border-color: var(--accent); }
  .result-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .result-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .result-excerpt { font-size: 13px; color: var(--muted); line-height: 1.7; }
  mark { background: #d4edcf; color: inherit; border-radius: 2px; padding: 0 1px; }

  .no-results { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }

  /* ===== TTS 편 전체 ===== */
  .tts-chapter-bar {
    display:flex; align-items:center; gap:8px;
    margin-bottom:1.5rem; padding:10px 14px;
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
  }
  .tts-ch-btn {
    border:1px solid var(--border); border-radius:4px; background:transparent;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-size:13px;
    color:var(--muted); padding:5px 12px; transition:all 0.2s;
  }
  .tts-ch-btn:hover { border-color:var(--accent); color:var(--accent); }
  .tts-ch-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tts-ch-btn:disabled { opacity:0.3; cursor:default; }
  .tts-ch-status { font-size:12px; color:var(--muted); margin-left:4px; }

  /* 반응형 */
  @media (max-width: 700px) {
    aside { display: none; }
    .chapter-select-wrap { display: block; }
    main { padding: 1.2rem 1rem 3rem; }
    .ch-hanja { font-size: 22px; }
    .layout { min-height: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo">莊子</div>
      <div class="logo-sub">장자 전문 검색 · 내편·외편</div>
    </div>
    <div class="search-area">
      <input class="search-input" id="searchInput" type="text" placeholder="원문, 이야기 제목 검색…" autocomplete="off">
      <div class="search-hint" id="searchHint"></div>
    </div>
    <a class="home-link" href="../">← 고전 목록</a>
  </div>
</header>

<div class="chapter-select-wrap">
  <div class="type-chips">
    <button class="type-chip active" data-type="내편" onclick="selectChip(this)">내편</button>
    <button class="type-chip" data-type="외편" onclick="selectChip(this)">외편</button>
    <button class="type-chip" data-type="잡편" onclick="selectChip(this)">잡편</button>
  </div>
  <select class="chapter-select" id="chapterSelect" onchange="selectChapterById(this.value)">
  </select>
</div>

<div class="hanja-overlay" id="hanjaOverlay" onclick="closeHanjaModal(event)">
  <div class="hanja-modal">
    <button class="hanja-modal-close" onclick="closeHanjaModal()">×</button>
    <div class="hanja-modal-title">한자 풀이 漢字</div>
    <div id="hanjaGrid"></div>
  </div>
</div>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main">
    <div class="chapter-view" id="chapterView"></div>
    <div class="search-results" id="searchResults"></div>
  </main>
</div>

<script src="data.js"></script>

    for (const ch of line) {
      if (isCJK(ch) && HANJA_DICT[ch]) {
        out += `<ruby>${ch}<rt>${HANJA_DICT[ch].r}</rt></ruby>`;
      } else {
        out += ch.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
    }
    return `<span style="display:block">${out}</span>`;
  }).join('');
}

function showHanjaModal(storyId) {
  let text = '';
  for (const chapter of JANGJA) {
    const s = chapter.stories.find(s => s.id === storyId);
    if (s) { text = s.text; break; }
  }
  if (!text) return;
  const lines = text.split('\n');
  let html = '';
  lines.forEach((line, i) => {
    html += '<div class="anno-grid">';
    for (const ch of line) {
      if (isCJK(ch)) {
        const info = HANJA_DICT[ch];
        if (info) {
          html += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean">${info.m}</span><span class="ac-read">${info.r}</span></div>`;
        } else {
          html += `<div class="anno-card"><span class="ac-hanja">${ch}</span><span class="ac-mean"> </span><span class="ac-read"> </span></div>`;
        }
      } else if (/[，。？！、；：「」『』]/.test(ch)) {
        html += `<span class="anno-punct">${ch}</span>`;
      }
    }
    html += '</div>';
    if (i < lines.length - 1) html += '<div class="anno-break"></div>';
  });
  document.getElementById('hanjaGrid').innerHTML = html;
  document.getElementById('hanjaOverlay').classList.add('open');
}

function closeHanjaModal(e) {
  if (!e || e.target === document.getElementById('hanjaOverlay')) {
    document.getElementById('hanjaOverlay').classList.remove('open');
  }
}

// 전체 목록: JANGJA(data.js) + 준비 중
function getAllChapters() {
  const ready = JANGJA.map(c => c.id);
  const cs = COMING_SOON.filter(c => !ready.includes(c.id));
  return [...JANGJA, ...cs].sort((a, b) => {
    const typeOrder = { "내편": 0, "외편": 1 };
    if (typeOrder[a.type] !== typeOrder[b.type]) return typeOrder[a.type] - typeOrder[b.type];
    return a.number - b.number;
  });
}

let currentChapterId = null;

// ===== 사이드바 렌더 =====
let activeChipType = '내편';

function selectChip(el) {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeChipType = el.dataset.type;
  renderSelectOnly();
}

function renderSelectOnly() {
  const all = getAllChapters();
  const select = document.getElementById('chapterSelect');
  let selectHtml = '';
  all.filter(ch => ch.type === activeChipType).forEach(ch => {
    const isReady = !!ch.stories;
    const sel = ch.id === currentChapterId ? ' selected' : '';
    selectHtml += `<option value="${ch.id}"${sel} ${!isReady ? 'disabled' : ''}>${ch.number}. ${ch.hanja} ${ch.ko}${!isReady ? ' (준비 중)' : ''}</option>`;
  });
  select.innerHTML = selectHtml;
}

function syncChipToCurrentChapter() {
  const all = getAllChapters();
  const ch = all.find(c => c.id === currentChapterId);
  if (!ch) return;
  activeChipType = ch.type;
  document.querySelectorAll('.type-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.type === activeChipType);
  });
  renderSelectOnly();
}

const collapsedTypes = new Set();

function toggleSidebarType(type) {
  if (collapsedTypes.has(type)) collapsedTypes.delete(type);
  else collapsedTypes.add(type);
  renderSidebar();
}

function renderSidebar() {
  const all = getAllChapters();
  const sidebar = document.getElementById('sidebar');

  // 타입별 그룹화
  const groups = [];
  all.forEach(ch => {
    let g = groups.find(g => g.type === ch.type);
    if (!g) { g = { type: ch.type, items: [] }; groups.push(g); }
    g.items.push(ch);
  });

  let html = '';
  groups.forEach(g => {
    const isCollapsed = collapsedTypes.has(g.type);
    const itemsHtml = g.items.map(ch => {
      const isReady = !!ch.stories;
      const activeClass = ch.id === currentChapterId ? ' active' : '';
      const soonClass = !isReady ? ' soon' : '';
      const onclick = isReady ? `onclick="selectChapterById('${ch.id}')"` : '';
      return `<div class="sidebar-item${activeClass}${soonClass}" ${onclick}>
        <span class="si-num">${ch.number}.</span>
        <span class="si-hanja">${ch.hanja}</span>
        <span class="si-ko">${ch.ko}</span>
        ${isReady ? `<span class="si-count">${ch.stories.length}</span>` : ''}
      </div>`;
    }).join('');

    const groupHeight = g.items.length * 38;
    html += `
      <div class="sidebar-type${isCollapsed ? ' collapsed' : ''}" onclick="toggleSidebarType('${g.type}')">
        <span>${g.type}</span>
        <span class="sidebar-type-arrow">▼</span>
      </div>
      <div class="sidebar-group${isCollapsed ? ' collapsed' : ''}" style="max-height:${isCollapsed ? 0 : groupHeight + 20}px">
        ${itemsHtml}
      </div>`;
  });

  sidebar.innerHTML = html;
  syncChipToCurrentChapter();
}

// ===== 편 선택 =====
function selectChapterById(id) {
  const all = getAllChapters();
  const ch = all.find(c => c.id === id);
  if (!ch) return;
  currentChapterId = id;

  // 검색 초기화
  document.getElementById('searchInput').value = '';
  document.getElementById('main').classList.remove('search-mode');
  document.getElementById('searchHint').textContent = '';

  ttsChapterStop();
  renderSidebar();
  renderChapter(ch);
}

// ===== 편 렌더 =====
function renderChapter(ch) {
  const view = document.getElementById('chapterView');

  if (!ch.stories) {
    view.innerHTML = `
      <div class="chapter-header">
        <div class="ch-type">${ch.type} ${ch.number}편</div>
        <div class="ch-title">
          <span class="ch-hanja">${ch.hanja}</span>
          <span class="ch-ko">${ch.ko}</span>
        </div>
        ${ch.meaning ? `<div class="ch-meaning">${ch.meaning}</div>` : ''}
      </div>
      <div class="coming-soon">
        <span class="cs-hanja">${ch.hanja}</span>
        준비 중입니다
      </div>`;
    return;
  }

  let storiesHtml = '';
  ch.stories.forEach((s, i) => {
    storiesHtml += `
      <div class="story-card" id="${s.id}">
        <div class="story-head" onclick="toggleStory('${s.id}')">
          <span class="story-num">${i + 1}</span>
          <span class="story-hanja">${s.hanja}</span>
          <span class="story-title">${s.title}</span>
          <span class="story-arrow">▼</span>
        </div>
        <div class="story-body">
          <div class="section-label">원문 <span style="font-size:9px;color:var(--muted);font-weight:300;letter-spacing:0">· 클릭하면 한자 풀이</span></div>
          <div class="text-original" onclick="showHanjaModal('${s.id}')">${rubyText(s.text)}</div>
          <hr class="section-divider">
          <div class="section-label">직역</div>
          <div class="text-literal">${esc(s.literal)}</div>
          <hr class="section-divider">
          <div class="section-label">해석</div>
          <div class="text-meaning">${esc(s.meaning)}</div>
        </div>
      </div>`;
  });

  const all = getAllChapters();
  const idx = all.findIndex(c => c.id === ch.id);
  const prev = all[idx - 1];
  const next = all[idx + 1];

  view.innerHTML = `
    <div class="chapter-header">
      <div class="ch-type">${ch.type} ${ch.number}편</div>
      <div class="ch-title">
        <span class="ch-hanja">${ch.hanja}</span>
        <span class="ch-ko">${ch.ko}</span>
      </div>
      ${ch.meaning ? `<div class="ch-meaning">${ch.meaning}</div>` : ''}
      ${ch.intro ? `
      <div class="ch-intro-wrap" id="intro-${ch.id}">
        <div class="ch-intro-toggle" onclick="toggleIntro('${ch.id}')">
          <div class="ch-intro-keywords">
            ${(ch.introKeywords || []).map(k => `<span class="ch-intro-kw">${k}</span>`).join('')}
          </div>
          <div class="ch-intro-btn">개요 <span class="ch-intro-arrow">▼</span></div>
        </div>
        <div class="ch-intro-body">
          <div class="ch-intro">${esc(ch.intro)}</div>
        </div>
      </div>` : ''}
    </div>
    <div class="tts-chapter-bar">
      <button class="tts-ch-btn" id="ttsChapterPlay" onclick="ttsChapterPlay()">▶ 편 전체 읽기</button>
      <button class="tts-ch-btn" id="ttsChapterPause" onclick="ttsChapterPause()" disabled>⏸ 일시정지</button>
      <button class="tts-ch-btn" id="ttsChapterStop" onclick="ttsChapterStop()" disabled>⏹ 정지</button>
      <span class="tts-ch-status" id="ttsChapterStatus"></span>
    </div>
    ${storiesHtml}
    <div class="nav-btns">
      <button class="nav-btn" onclick="selectChapterById('${prev ? prev.id : ''}')" ${!prev ? 'disabled' : ''}>
        ← ${prev ? prev.number + '편 ' + prev.ko : ''}
      </button>
      <button class="nav-btn" onclick="selectChapterById('${next ? next.id : ''}')" ${!next ? 'disabled' : ''}>
        ${next ? next.number + '편 ' + next.ko : ''} →
      </button>
    </div>`;
}

function toggleIntro(chapterId) {
  const wrap = document.getElementById('intro-' + chapterId);
  if (wrap) wrap.classList.toggle('open');
}

function toggleStory(id) {
  const card = document.getElementById(id);
  if (!card) return;
  card.classList.toggle('open');
}

/* ===== TTS 편 전체 ===== */
let ttsChapterState = 'stopped';
let ttsChapterStories = [];
let ttsChapterIdx = 0;
let ttsChapterPhase = 'literal';
let ttsChapterPrevId = null;

function ttsChapterPlay() {
  if (ttsChapterState === 'paused') {
    window.speechSynthesis.resume();
    ttsChapterState = 'playing';
    updateTtsChapterUI();
    return;
  }
  if (ttsChapterState === 'playing') return;
  const all = getAllChapters();
  const ch = all.find(c => c.id === currentChapterId);
  if (!ch || !ch.stories || ch.stories.length === 0) return;
  ttsChapterStories = ch.stories;
  ttsChapterIdx = 0;
  ttsChapterPhase = 'literal';
  ttsChapterPrevId = null;
  ttsChapterState = 'playing';
  window.speechSynthesis.cancel();
  ttsReadNext();
}

function ttsReadNext() {
  if (ttsChapterState !== 'playing') return;
  if (ttsChapterIdx >= ttsChapterStories.length) {
    if (ttsChapterPrevId) {
      const prev = document.getElementById(ttsChapterPrevId);
      if (prev) prev.classList.remove('open');
    }
    ttsChapterState = 'stopped';
    ttsChapterPrevId = null;
    updateTtsChapterUI();
    return;
  }
  const s = ttsChapterStories[ttsChapterIdx];
  const text = ttsChapterPhase === 'literal' ? (s.literal || '') : (s.meaning || '');
  if (ttsChapterPhase === 'literal') {
    if (ttsChapterPrevId && ttsChapterPrevId !== s.id) {
      const prevCard = document.getElementById(ttsChapterPrevId);
      if (prevCard) prevCard.classList.remove('open');
    }
    const card = document.getElementById(s.id);
    if (card) {
      card.classList.add('open');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    ttsChapterPrevId = s.id;
    updateTtsChapterUI(`${ttsChapterIdx + 1} / ${ttsChapterStories.length} — 직역 읽는 중…`);
  } else {
    updateTtsChapterUI(`${ttsChapterIdx + 1} / ${ttsChapterStories.length} — 해석 읽는 중…`);
  }
  if (!text.trim()) {
    advanceTtsChapter();
    return;
  }
  const utt = new SpeechSynthesisUtterance(text.replace(/\n/g, ' '));
  utt.lang = 'ko-KR';
  utt.rate = 0.9;
  utt.onend = () => { if (ttsChapterState === 'playing') advanceTtsChapter(); };
  utt.onerror = (e) => {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    if (ttsChapterState === 'playing') advanceTtsChapter();
  };
  window.speechSynthesis.speak(utt);
}

function advanceTtsChapter() {
  if (ttsChapterPhase === 'literal') {
    ttsChapterPhase = 'meaning';
  } else {
    ttsChapterPhase = 'literal';
    ttsChapterIdx++;
  }
  ttsReadNext();
}

function ttsChapterPause() {
  if (ttsChapterState === 'playing') {
    window.speechSynthesis.pause();
    ttsChapterState = 'paused';
    updateTtsChapterUI();
  }
}

function ttsChapterStop() {
  window.speechSynthesis.cancel();
  if (ttsChapterPrevId) {
    const prev = document.getElementById(ttsChapterPrevId);
    if (prev) prev.classList.remove('open');
    ttsChapterPrevId = null;
  }
  ttsChapterState = 'stopped';
  updateTtsChapterUI();
}

function updateTtsChapterUI(statusText) {
  const playBtn = document.getElementById('ttsChapterPlay');
  const pauseBtn = document.getElementById('ttsChapterPause');
  const stopBtn = document.getElementById('ttsChapterStop');
  const status = document.getElementById('ttsChapterStatus');
  if (!playBtn) return;
  if (ttsChapterState === 'stopped') {
    playBtn.textContent = '▶ 편 전체 읽기';
    playBtn.classList.remove('active');
    if (pauseBtn) { pauseBtn.disabled = true; pauseBtn.textContent = '⏸ 일시정지'; }
    if (stopBtn) stopBtn.disabled = true;
    if (status) status.textContent = '';
  } else if (ttsChapterState === 'playing') {
    playBtn.textContent = '▶ 재생 중';
    playBtn.classList.add('active');
    if (pauseBtn) { pauseBtn.disabled = false; }
    if (stopBtn) stopBtn.disabled = false;
    if (status) status.textContent = statusText || '';
  } else if (ttsChapterState === 'paused') {
    playBtn.textContent = '▶ 계속 읽기';
    playBtn.classList.remove('active');
    if (pauseBtn) pauseBtn.disabled = true;
    if (stopBtn) stopBtn.disabled = false;
    if (status) status.textContent = '일시정지됨';
  }
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== 검색 =====
function buildSearchIndex() {
  const idx = [];
  JANGJA.forEach(ch => {
    ch.stories.forEach(s => {
      idx.push({
        chapterId: ch.id,
        chapterLabel: `${ch.type} ${ch.number}. ${ch.hanja} ${ch.ko}`,
        storyId: s.id,
        title: s.title,
        hanja: s.hanja,
        text: s.text,
        literal: s.literal,
        meaning: s.meaning,
        full: [s.title, s.hanja, s.text, s.literal, s.meaning].join(' ')
      });
    });
  });
  return idx;
}

let searchIndex = null;

function highlight(str, q) {
  if (!q) return esc(str);
  const terms = q.trim().split(/\s+/).filter(Boolean);
  return terms.reduce((s, t) => {
    const escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return s.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
  }, esc(str));
}

function doSearch(q) {
  if (!searchIndex) searchIndex = buildSearchIndex();
  const main = document.getElementById('main');
  const hint = document.getElementById('searchHint');
  const results = document.getElementById('searchResults');

  if (!q.trim()) {
    main.classList.remove('search-mode');
    hint.textContent = '';
    return;
  }

  main.classList.add('search-mode');
  const terms = q.trim().split(/\s+/).filter(Boolean);
  const matched = searchIndex.filter(s => terms.every(t => s.full.includes(t)));
  hint.textContent = `"${terms.join(' + ')}" — ${matched.length}건`;

  if (matched.length === 0) {
    results.innerHTML = `<div class="no-results">검색 결과가 없습니다.</div>`;
    return;
  }

  results.innerHTML = matched.map(s => {
    const excerpt = getExcerpt(s.full, q, 80);
    return `<div class="result-card" onclick="openStory('${s.chapterId}','${s.storyId}')">
      <div class="result-meta">${s.chapterLabel}</div>
      <div class="result-title">${highlight(s.hanja, q)} ${highlight(s.title, q)}</div>
      <div class="result-excerpt">${highlight(excerpt, q)}</div>
    </div>`;
  }).join('');
}

function getExcerpt(text, q, len) {
  const idx = text.indexOf(q);
  if (idx < 0) return text.slice(0, len) + '…';
  const start = Math.max(0, idx - 20);
  const end = Math.min(text.length, idx + len);
  return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
}

function openStory(chapterId, storyId) {
  selectChapterById(chapterId);
  setTimeout(() => {
    const el = document.getElementById(storyId);
    if (el) {
      el.classList.add('open');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 100);
}

// ===== 초기화 =====
document.getElementById('searchInput').addEventListener('input', e => doSearch(e.target.value));

renderSidebar();

// 첫 번째 준비된 편 자동 선택
const first = getAllChapters().find(c => c.stories);
if (first) selectChapterById(first.id);
